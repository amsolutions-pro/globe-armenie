<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas de l'Arménie historique — frontières d'atlas historiques</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --obsidienne:#171210; --tuf:#241b15; --parchemin:#ece0cc; --parchemin-2:#c9b89d;
  --or:#d4a548; --trait:#3a2e24;
}
*{box-sizing:border-box;margin:0;padding:0}
button{touch-action:manipulation}
html,body{height:100%}
body{background:var(--obsidienne);color:var(--parchemin);
  font-family:"IBM Plex Sans",system-ui,sans-serif;display:flex;flex-direction:column;height:100vh;height:100dvh}
header{padding:12px 22px 9px;border-bottom:1px solid var(--trait);
  display:flex;align-items:baseline;gap:18px;flex-wrap:wrap;flex:none}
h1{font-family:"Cormorant Garamond",Georgia,serif;font-weight:700;
  font-size:clamp(1.25rem,2.6vw,1.8rem);letter-spacing:.02em}
h1 .arm{color:var(--or);font-weight:600;margin-right:.4em}
header .sous{color:var(--parchemin-2);font-size:.8rem;max-width:60ch}
main{flex:1;display:grid;grid-template-columns:minmax(0,1.65fr) minmax(300px,.78fr);min-height:0}
#mapcol{display:flex;flex-direction:column;min-width:0;min-height:0}
#periodbar{display:flex;align-items:center;gap:12px;padding:7px 14px;flex:none}
#periodbar button.nav{background:none;border:1px solid var(--trait);color:var(--or);
  width:37px;height:37px;border-radius:50%;font-size:1rem;cursor:pointer;flex:none;
  transition:border-color .2s,background .2s}
#periodbar button.nav:hover{border-color:var(--or);background:#2a2019}
#periodbar button.nav:focus-visible{outline:2px solid var(--or);outline-offset:2px}
#ptitle .nom{font-family:"Cormorant Garamond",Georgia,serif;
  font-size:clamp(1.05rem,2.1vw,1.45rem);font-weight:600;line-height:1.1}
#ptitle .dates{color:var(--or);font-size:.76rem;letter-spacing:.14em;text-transform:uppercase;margin-top:2px}
#map{flex:1;min-height:0;border-top:1px solid var(--trait)}
.leaflet-container{background:#b8c6cc;font:inherit}
.zlabel{background:none;border:none;box-shadow:none;
  font-family:"Cormorant Garamond",Georgia,serif;font-weight:700;font-size:14px;
  color:#2c1f14;text-shadow:0 0 3px rgba(255,250,240,.95),0 0 7px rgba(255,250,240,.8);
  letter-spacing:.04em;white-space:nowrap;pointer-events:none;text-align:center}
.zlabel.ov{color:#5c4308;font-style:italic}
.capicon{background:none;border:none}
.capicon .star{font-size:19px;color:#b8860b;text-shadow:0 1px 2px rgba(0,0,0,.6),0 0 4px #fff;cursor:pointer;line-height:1}
.capicon.sec .star{font-size:13px;color:#8a6d1f}
.capicon .mn{font-size:11.5px;font-weight:600;color:#241505;
  text-shadow:0 0 3px #fff,0 0 5px #fff;margin-left:2px;vertical-align:2px;white-space:nowrap}
.leaflet-tooltip.provtip{background:#241b15;color:var(--parchemin);border:1px solid var(--or);border-radius:2px;font-size:.8rem}
#panel{border-left:1px solid var(--trait);background:var(--tuf);padding:18px 20px 26px;overflow-y:auto;min-height:0}
#panel .eyebrow{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--or);margin-bottom:8px}
#panel h2{font-family:"Cormorant Garamond",Georgia,serif;font-weight:700;font-size:1.4rem;line-height:1.15;margin-bottom:6px}
#panel .sousdates{color:var(--parchemin-2);font-size:.83rem;margin-bottom:12px}
.badge{display:inline-block;font-size:.72rem;letter-spacing:.06em;
  border:1px solid var(--trait);border-left:3px solid var(--or);
  padding:5px 10px;margin:0 6px 13px 0;color:var(--parchemin-2);background:#1d1611;border-radius:2px}
#panel p{font-size:.88rem;line-height:1.6;color:#ddd0ba;margin-bottom:12px}
#panel p strong{color:var(--parchemin)}
#panel .astuce{margin-top:15px;padding-top:13px;border-top:1px dashed var(--trait);
  font-size:.77rem;color:#9d8f79;font-style:italic}
#panel .retour{background:none;border:none;color:var(--or);cursor:pointer;font-size:.8rem;
  padding:0;margin-bottom:12px;letter-spacing:.05em;font-family:inherit}
#panel .retour:hover{text-decoration:underline}
#fermer{display:none}
#infobtn{display:none}
#timeline{border-top:1px solid var(--trait);display:flex;overflow-x:auto;background:#120e0b;flex:none;scrollbar-width:thin}
#timeline button{flex:1 0 114px;background:none;border:none;border-right:1px solid var(--trait);
  color:var(--parchemin-2);padding:8px 8px 10px;cursor:pointer;text-align:left;
  font-family:inherit;transition:background .2s;position:relative}
#timeline button:hover{background:#1d1712}
#timeline button:focus-visible{outline:2px solid var(--or);outline-offset:-2px}
#timeline .bar{height:4px;border-radius:2px;margin-bottom:6px;opacity:.85}
#timeline .td{font-size:.63rem;letter-spacing:.08em;color:#8d7f6a;text-transform:uppercase}
#timeline .tn{font-size:.76rem;font-weight:600;color:var(--parchemin-2);line-height:1.25;margin-top:2px}
#timeline button.actif{background:#241b13}
#timeline button.actif .tn{color:var(--or)}
#timeline button.actif::after{content:"";position:absolute;left:0;right:0;top:0;height:2px;background:var(--or)}
@media (max-width:860px){
  header{padding:10px 14px 8px}
  header .sous{display:none}
  main{display:block;position:relative}
  #mapcol{height:100%}
  #periodbar{padding:6px 10px}
  #periodbar button.nav{width:44px;height:44px}
  #panel{
    position:fixed;left:0;right:0;bottom:0;z-index:1200;
    max-height:68dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;
    border-left:none;border-top:2px solid var(--or);border-radius:14px 14px 0 0;
    padding:14px 18px calc(24px + env(safe-area-inset-bottom));
    box-shadow:0 -10px 34px rgba(0,0,0,.55);
    transform:translateY(105%);transition:transform .28s ease;
  }
  #panel.ouvert{transform:translateY(0)}
  #fermer{
    display:block;float:right;position:sticky;top:0;
    background:#2a2019;border:1px solid var(--trait);color:var(--parchemin);
    width:38px;height:38px;border-radius:50%;font-size:1.05rem;
    margin:-2px -4px 6px 10px;cursor:pointer;
  }
  #infobtn{
    display:block;position:absolute;right:12px;bottom:14px;z-index:1100;
    background:var(--tuf);color:var(--or);border:1px solid var(--or);
    border-radius:999px;padding:11px 18px;font-family:inherit;
    font-size:.88rem;font-weight:600;box-shadow:0 4px 14px rgba(0,0,0,.45);cursor:pointer;
  }
  #timeline button{flex:1 0 130px;padding:12px 10px 14px}
  #timeline .tn{font-size:.82rem}
  #timeline .td{font-size:.68rem}
  .zlabel{font-size:12px}
}
@media (prefers-reduced-motion:reduce){
  #panel{transition:none}
}
</style>
</head>
<body>
<header>
  <h1><span class="arm">Հայք</span>Atlas de l'Arménie historique</h1>
  <div class="sous">Frontières issues d'atlas historiques numérisés (historical-basemaps), superposées à la géographie réelle. Naviguez dans le temps, puis cliquez sur les États et les capitales <span style="color:var(--or)">★</span>.</div>
</header>
<main>
  <div id="mapcol">
    <div id="periodbar">
      <button class="nav" id="prev" aria-label="Période précédente">◀</button>
      <div id="ptitle"><div class="nom"></div><div class="dates"></div></div>
      <button class="nav" id="next" aria-label="Période suivante">▶</button>
    </div>
    <div id="map"></div>
  </div>
  <aside id="panel" aria-live="polite">
    <button id="fermer" aria-label="Fermer le panneau">✕</button>
    <div id="pbody"></div>
  </aside>
  <button id="infobtn" aria-label="Informations sur la période">ℹ︎&nbsp;Détails</button>
</main>
<footer id="timeline" role="tablist" aria-label="Frise chronologique"></footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const PERIODES = [{"nom": "Royaume d'Ourartou", "dates": "v. 860 – 590 av. J.-C.", "pouvoir": "Royaume indépendant (Biaïnili)", "apercu": ["Le royaume d'<strong>Ourartou</strong> (Biaïnili en ourartéen, « royaume d'Ararat » dans la Bible) unifie les hauts plateaux autour du lac de Van sous Sarduri I<sup>er</sup> vers 860 av. J.-C. Grand rival de l'Assyrie, il excelle en hydraulique — le canal de Menua, long de 72 km, irrigue encore la région de Van —, en métallurgie du bronze et en architecture de forteresses.", "Affaibli par les raids cimmériens et scythes, le royaume s'effondre vers 590 av. J.-C. face aux Mèdes. C'est sur ce substrat que la population arménienne émerge dans les sources."], "contexte": "Rivalité permanente avec l'Assyrie : campagnes de Salmanazar III, sac de la ville sainte de Musasir par Sargon II en 714 av. J.-C.", "capitales": [{"nom": "Tushpa (Van)", "lat": 38.5, "lng": 43.34, "principal": true, "info": "Capitale fondée par Sarduri Iᵉʳ sur un éperon rocheux dominant le lac de Van. La citadelle conserve les annales cunéiformes des rois et les tombes rupestres royales."}, {"nom": "Erebouni", "lat": 40.14, "lng": 44.54, "info": "Forteresse fondée en 782 av. J.-C. par Argishti Iᵉʳ sur la colline d'Arin Berd, avec « 6 600 guerriers déportés ». Erevan, qui en descend, est ainsi plus ancienne que Rome de 29 ans."}, {"nom": "Rusahinili", "lat": 38.55, "lng": 43.45, "info": "Résidence royale de Rusa II (VIIᵉ s. av. J.-C.) près de Tushpa, dernière grande fondation du royaume avant son déclin."}], "tc": "#b0762e"}, {"nom": "Satrapie d'Arménie", "dates": "590 – 331 av. J.-C.", "pouvoir": "Empire mède puis achéménide · dynastie orontide", "apercu": ["Après la chute d'Ourartou, le plateau passe aux Mèdes puis à l'Empire perse achéménide. L'inscription trilingue de <strong>Béhistoun</strong> (520 av. J.-C.) mentionne pour la première fois le nom d'« Armina ».", "La dynastie locale des <strong>Orontides</strong> (Yervandouni) gouverne la satrapie, qui verse 400 talents d'argent et fournit 20 000 poulains par an pour les fêtes de Mithra, selon Strabon. Xénophon et les Dix Mille traversent ses villages enneigés en 401 av. J.-C."], "contexte": "Première occupation impériale : l'Arménie est une province (satrapie) intégrée au système perse des routes royales et du tribut, mais administrée par une dynastie arménienne.", "capitales": [{"nom": "Erebouni", "lat": 40.14, "lng": 44.54, "principal": true, "info": "L'ancienne forteresse ourartéenne devient siège satrapal : on y a retrouvé des rhytons d'argent achéménides et une salle d'apadana à colonnes."}, {"nom": "Armavir", "lat": 40.06, "lng": 44.04, "info": "L'ancienne Argishtikhinili ourartéenne, résidence des Orontides dans la plaine de l'Araxe — future première capitale du royaume indépendant."}], "tc": "#3e6b8f"}, {"nom": "Royaume orontide", "dates": "331 – 200 av. J.-C.", "pouvoir": "Dynastie orontide (Yervandouni), indépendance de fait", "apercu": ["Après Gaugamèles (331 av. J.-C.), le satrape <strong>Orontès</strong> (Yervand) se rend indépendant de fait tandis que l'empire d'Alexandre se disloque : l'Arménie n'a jamais été réellement conquise par les Macédoniens.", "Les Orontides règnent en rois, entre Séleucides au sud et royaume du Pont au nord, dans une hellénisation mesurée. Vers 200 av. J.-C., Antiochos III dépose le dernier Orontide et confie le pays à ses stratèges Artaxias et Zariadrès — qui ne tarderont pas à le trahir."], "contexte": "Entre-deux impérial : indépendance réelle mais suzeraineté séleucide théorique, reconnue par un tribut intermittent.", "capitales": [{"nom": "Armavir", "lat": 40.06, "lng": 44.04, "info": "Première capitale royale ; on y a trouvé des inscriptions grecques gravées sur les rochers, citant Euripide et Hésiode."}, {"nom": "Yervandashat", "lat": 40.03, "lng": 43.67, "principal": true, "info": "Fondée par Yervand IV au confluent de l'Araxe et de l'Akhourian, « aux rochers escarpés », dernière capitale orontide."}], "tc": "#7a8f4a"}, {"nom": "Royaume artaxiade", "dates": "189 – 1 av. J.-C.", "pouvoir": "Dynastie artaxiade · apogée sous Tigrane II le Grand", "apercu": ["En 189 av. J.-C., après la défaite d'Antiochos III face à Rome, <strong>Artaxias I<sup>er</sup></strong> (Artachès) se proclame roi et, selon Strabon, « rassemble les terres où l'on parle une seule et même langue, l'arménien ».", "Apogée sous <strong>Tigrane II le Grand</strong> (95–55 av. J.-C.) : allié de Mithridate du Pont, il conquiert la Syrie, la Cilicie, l'Atropatène et se proclame « roi des rois ». Son empire s'étend de la Caspienne à la Méditerranée — avant que Lucullus (69) puis Pompée (66 av. J.-C.) ne le ramènent à la Grande Arménie."], "contexte": "L'Arménie devient l'État tampon disputé entre Rome et les Parthes — un rôle qu'elle gardera sept siècles.", "capitales": [{"nom": "Artashat", "lat": 39.93, "lng": 44.55, "principal": true, "info": "Fondée v. 176 av. J.-C. sur l'Araxe — selon la tradition, sur les conseils d'Hannibal réfugié à la cour. Les Romains la surnommaient « la Carthage arménienne »."}, {"nom": "Tigranakert", "lat": 38.14, "lng": 41, "info": "Capitale impériale fondée v. 83 av. J.-C. par Tigrane, peuplée de Grecs déportés de Cappadoce. Prise et pillée par Lucullus en 69 av. J.-C."}], "tc": "#a33434"}, {"nom": "Royaume arsacide", "dates": "66 – 428 apr. J.-C.", "pouvoir": "Dynastie arsacide, entre Rome et la Perse", "apercu": ["En 66 apr. J.-C., <strong>Tiridate I<sup>er</sup></strong>, frère du roi parthe, reçoit la couronne d'Arménie des mains de Néron à Rome : compromis fondateur — dynastie parthe, investiture romaine.", "En <strong>301</strong>, Tiridate III, converti par saint Grégoire l'Illuminateur, fait du christianisme la religion d'État : une première mondiale. En <strong>405</strong>, le moine Mesrop Machtots crée l'alphabet arménien, toujours en usage. La monarchie est abolie par la Perse en 428, à la demande des nakharars eux-mêmes."], "contexte": "Partage de 387 : Rome et la Perse sassanide se divisent le royaume — environ un cinquième à l'ouest pour Rome, le reste sous influence perse.", "capitales": [{"nom": "Vagharshapat", "lat": 40.16, "lng": 44.29, "principal": true, "info": "Capitale au IIIᵉ siècle et siège spirituel : la cathédrale d'Etchmiadzin, fondée en 301–303, est l'une des plus anciennes du monde chrétien."}, {"nom": "Artashat", "lat": 39.93, "lng": 44.55, "info": "Ancienne capitale artaxiade, restée grande ville marchande ; un traité romano-perse y réglemente le commerce de la soie."}, {"nom": "Dvin", "lat": 40, "lng": 44.63, "info": "Fondée v. 335 par Khosrov III ; capitale politique tardive, elle deviendra le siège des catholicos puis des gouverneurs perses et arabes."}], "tc": "#7c4a6e"}, {"nom": "Marzpanat et Arménie byzantine", "dates": "428 – 640", "pouvoir": "Partition : Perse sassanide (est) · Empire byzantin (ouest)", "apercu": ["À l'est, la Perse sassanide gouverne la <strong>Persarménie</strong> par un marzpan (vice-roi) siégeant à Dvin ; à l'ouest, Byzance administre ses provinces arméniennes réorganisées par Justinien (Arménie I à IV).", "En <strong>451</strong>, la tentative du roi perse Yazdgerd II d'imposer le zoroastrisme provoque la bataille d'<strong>Avarayr</strong> : défaite militaire de Vardan Mamikonian, mais victoire morale — le traité de Nvarsak (484) garantit la liberté religieuse des Arméniens. En 591, la frontière est déplacée vers l'est au profit de Byzance."], "contexte": "Période sans roi : le pouvoir réel appartient aux grandes familles nakharars et à l'Église, qui rompt avec Constantinople au concile de Dvin (554).", "capitales": [{"nom": "Dvin", "lat": 40, "lng": 44.63, "principal": true, "info": "Siège du marzpan et, à partir de 485, du catholicossat. Grande ville caravanière aux quartiers d'artisans, plusieurs fois détruite par les séismes et les sièges."}, {"nom": "Karin (Théodosiopolis)", "lat": 39.91, "lng": 41.28, "info": "Verrou byzantin sur la route des invasions, fondée au Vᵉ siècle — l'actuelle Erzurum. Les conciles de l'Église arménienne s'y tiennent parfois côté romain."}], "tc": "#2e7f7a"}, {"nom": "Arminiya arabe", "dates": "640 – 884", "pouvoir": "Califat omeyyade puis abbasside (ostikanat)", "apercu": ["Les premières razzias arabes atteignent Dvin dès <strong>640</strong>. Vers 700, le califat organise la province d'<strong>Arminiya</strong>, regroupant Arménie, Ibérie géorgienne et Albanie du Caucase, gouvernée par un ostikan depuis Dvin puis Bardaa.", "Les révoltes des nakharars (703, 748, 774–775 — écrasée à Bagrévand) saignent les vieilles familles Mamikonian et Kamsarakan… au profit des <strong>Bagratides</strong>, plus prudents, qui accumulent titres, terres et la charge de « prince d'Arménie » jusqu'à reconquérir la couronne."], "contexte": "Occupation par intégration : tribut et garnisons arabes, mais autonomie des princes chrétiens reconnue par traité (le « pacte de Muawiya », 652).", "capitales": [{"nom": "Dvin", "lat": 40, "lng": 44.63, "principal": true, "info": "Siège de l'ostikan, avec mosquée, douanes et ateliers monétaires frappant des dirhams « Arminiya ». La ville reste aussi le siège du catholicos."}], "tc": "#3f7f4f"}, {"nom": "Royaumes bagratides", "dates": "884 – 1045", "pouvoir": "Dynastie bagratide et royaumes-frères", "apercu": ["En <strong>884</strong>, Achot I<sup>er</sup> Bagratouni est couronné « roi des Arméniens », reconnu à la fois par le calife et par l'empereur byzantin. <strong>Ani</strong> devient capitale en 961 : la « ville aux mille et une églises », étape des routes de la soie, compterait près de 100 000 habitants.", "Le royaume se fragmente en royaumes-frères — Vaspurakan (908), Kars (963), Lori (978), Syounik (987) — proie facile : Byzance annexe le Vaspurakan (1021) puis Ani (<strong>1045</strong>) ; les Seldjoukides pillent Ani en 1064 et écrasent Byzance à <strong>Manzikert (1071)</strong>, ouvrant l'Anatolie aux Turcs."], "contexte": "Âge d'or de l'architecture (Ani, Aghtamar, Sanahin, Haghpat) sur fond de morcellement politique fatal.", "capitales": [{"nom": "Ani", "lat": 40.51, "lng": 43.57, "principal": true, "info": "Capitale à partir de 961, entre ravins et remparts doubles. Sa cathédrale (1001) est l'œuvre de Trdat — l'architecte appelé à réparer la coupole de Sainte-Sophie de Constantinople."}, {"nom": "Aghtamar", "lat": 38.34, "lng": 43.03, "info": "Île-palais du roi Gagik Ardzrouni : l'église Sainte-Croix (915–921) et ses bas-reliefs bibliques comptent parmi les chefs-d'œuvre de l'art médiéval."}, {"nom": "Kars", "lat": 40.61, "lng": 43.1, "info": "Capitale bagratide de 928 à 961, puis siège du royaume du Vanand jusqu'à sa cession à Byzance."}], "tc": "#c9a227"}, {"nom": "Cilicie et Zakarides", "dates": "1080 – 1375", "pouvoir": "Royaume arménien de Cilicie · principauté zakaride · Mongols", "apercu": ["Fuyant les invasions seldjoukides, des princes arméniens s'implantent en <strong>Cilicie</strong>, sur la Méditerranée : la principauté roupénide (1080) devient royaume lorsque <strong>Léon I<sup>er</sup> le Magnifique</strong> est couronné en 1198. Allié des croisés puis des Mongols, l'État prospère par ses ports — Ayas, escale décrite par Marco Polo.", "Sur le haut plateau, les frères <strong>Zakarian</strong>, généraux de la reine Tamar de Géorgie, libèrent le nord (1199–1236) avant la vague mongole. Sis tombe aux Mamelouks en <strong>1375</strong> ; le dernier roi, Léon V de Lusignan, meurt exilé à Paris en 1393 — son tombeau est à Saint-Denis."], "contexte": "L'Arménie existe désormais en deux lieux : un royaume maritime en Cilicie, et un haut plateau passé des Seldjoukides aux Mongols (1236) puis aux hordes turkmènes.", "capitales": [{"nom": "Sis", "lat": 37.45, "lng": 35.82, "principal": true, "info": "Capitale du royaume de Cilicie et siège d'un catholicossat qui y demeurera jusqu'en 1930. Prise par les Mamelouks en 1375 après un long siège."}, {"nom": "Ani", "lat": 40.51, "lng": 43.57, "info": "Renaissance marchande sous les Zakarian, puis lent déclin sous les Mongols ; un séisme (1319) et le déplacement des routes achèveront la ville."}], "tc": "#3a6fb5"}, {"nom": "Partages ottomano-persans", "dates": "1514 – 1828", "pouvoir": "Empire ottoman (ouest) · Perse séfévide puis kadjare (est)", "apercu": ["Après la bataille de Tchaldiran (<strong>1514</strong>), Ottomans et Séfévides se disputent le plateau ; la paix de Zuhab (<strong>1639</strong>) fige un partage durable : Arménie occidentale ottomane, Arménie orientale persane. En 1604, Chah Abbas déporte des centaines de milliers d'Arméniens vers Ispahan — la Nouvelle-Djoulfa, qui dominera le commerce de la soie jusqu'en Inde.", "En <strong>1828</strong>, le traité de Turkmentchaï cède les khanats d'Erevan et du Nakhitchevan à la Russie : matrice territoriale de l'Arménie moderne. De là naîtront la première République (1918) puis l'Arménie indépendante (1991)."], "contexte": "Quatre siècles sans État : l'Église (Etchmiadzin, restauré en 1441) et les diasporas marchandes deviennent l'armature de la nation.", "capitales": [{"nom": "Erevan", "lat": 40.18, "lng": 44.51, "principal": true, "info": "Siège du khanat persan, ville de forteresses, de mosquées et de jardins sur le Hrazdan. Sa prise en 1827 vaut à Paskévitch le titre de « comte d'Erivan »."}, {"nom": "Etchmiadzin", "lat": 40.16, "lng": 44.29, "info": "Le Saint-Siège, réinstallé en 1441, seule institution pan-arménienne : ses encycliques et ses quêtes relient Constantinople, Ispahan, Venise et Madras."}], "tc": "#7a2f3a"}];

const ENT = {"0": {"Urartu": {"d": "Royaume d'Ourartou (Biaïnili)", "c": "#b0762e", "n": "Le cœur du royaume autour de Tushpa, sur le lac de Van. Canaux (celui de Menua, 72 km, sert encore), forteresses rupestres, métallurgie du bronze et culte du dieu Haldi. Affaibli par Cimmériens et Scythes, il s'effondre vers 590 av. J.-C. face aux Mèdes — les Arméniens émergent sur ce substrat."}, "Assyria": {"d": "Empire assyrien", "c": "#8a3a3a", "n": "Le grand rival méridional. Salmanazar III mène les premières campagnes contre Ourartou ; Sargon II pille la ville sainte de Musasir en 714 av. J.-C., provoquant, dit-on, le suicide du roi Rusa Iᵉʳ."}, "Cimerians": {"d": "Cimmériens", "c": "#6e7d5a", "n": "Leur foyer est la steppe pontique, au nord de la mer Noire ; chassés par les Scythes, ils déferlent par les cols du Caucase, ravagent Ourartou (v. 714 av. J.-C.) puis détruisent la Phrygie de Midas et pillent la Lydie, avant de s'évanouir de l'histoire au VIIᵉ siècle."}, "Hittites": {"d": "Principautés néo-hittites", "c": "#9c7a4a", "n": "Héritières de l'empire hittite disparu : Melid (Malatya), Kummuh, Karkemish. Zone disputée entre Ourartou et l'Assyrie, qui les annexe une à une au VIIIᵉ siècle."}, "Phrygians": {"d": "Royaume de Phrygie", "c": "#7a6a8f", "n": "Le royaume du roi Midas, allié occasionnel d'Ourartou contre l'Assyrie, avant d'être submergé par les Cimmériens vers 675 av. J.-C."}, "state societies and Aramaean kingdoms": {"d": "Cités araméennes", "c": "#8f8a80", "n": "Mosaïque de cités-États araméennes et néo-hittites de haute Mésopotamie, absorbées par l'expansion assyrienne."}, "Arameans": {"d": "Tribus araméennes", "c": "#8f8a80", "n": "Tribus araméennes de la steppe syro-mésopotamienne, aux marges des grandes puissances."}, "Kingdom of David and Solomon": {"d": "Royaumes du Levant", "c": "#8f8a80", "n": "Royaumes levantins (l'atlas source utilise ici une étiquette légèrement anachronique), hors de l'orbite ourartéenne."}, "Iranian pastoralists": {"d": "Pasteurs iraniens (Mèdes, Perses…)", "c": "#5c7a8f", "n": "Tribus iraniennes du plateau, en voie de sédentarisation. Parmi elles, les Mèdes — qui abattront l'Assyrie (612) puis Ourartou (v. 590 av. J.-C.) — et les Perses, leurs futurs successeurs."}, "Proto-Scythian culture": {"d": "Proto-Scythes", "c": "#8f8a80", "n": "Nomades des steppes orientales, précurseurs des Scythes qui suivront les Cimmériens par le Caucase au VIIᵉ siècle."}, "Karasuk culture": {"d": "Cultures des steppes", "c": "#8f8a80", "n": "Horizon culturel des steppes eurasiennes, hors de portée des États du Proche-Orient."}, "Elam": {"d": "Élam", "c": "#8f8a80", "n": "Le vieux royaume de Suse, rival millénaire de la Mésopotamie, écrasé par Assurbanipal en 646 av. J.-C."}, "Babylonia": {"d": "Babylonie", "c": "#8f8a80", "n": "Sous domination assyrienne au VIIᵉ siècle, avant la revanche de Nabopolassar et la chute de Ninive (612 av. J.-C.)."}, "Thrace": {"d": "Thrace", "c": "#8f8a80", "n": "Tribus thraces des Balkans orientaux."}, "Greek city-states": {"d": "Cités grecques", "c": "#8f8a80", "n": "Le monde des cités à l'époque archaïque, qui commence à coloniser les rivages de la mer Noire."}, "Egypt": {"d": "Égypte", "c": "#8f8a80", "n": "L'Égypte de la XXVᵉ dynastie, bientôt envahie par l'Assyrie."}, "Arabian pastoral nomads": {"d": "Nomades d'Arabie", "c": "#8f8a80", "n": "Tribus chamelières du désert, aux marges des empires."}, "Saharan pastoral nomads": {"d": "Nomades sahariens", "c": "#8f8a80", "n": "Pasteurs des marges désertiques."}}, "1": {"Achaemenid Empire": {"d": "Empire achéménide", "c": "#3e6b8f", "n": "L'empire de Cyrus et de Darius, des Balkans à l'Indus, organisé en satrapies reliées par la route royale. C'est dans l'inscription trilingue de Béhistoun (520 av. J.-C.) qu'apparaît pour la première fois le nom d'« Armina »."}, "Satrapie d'Arménie (Armina)": {"ov": 1, "d": "Satrapie d'Arménie (Armina)", "c": "#d4a548", "n": "La satrapie XIII d'Hérodote, gouvernée par la dynastie arménienne des Orontides depuis Erebouni et Armavir. Tribut : 400 talents d'argent et 20 000 poulains par an pour les fêtes de Mithra (Strabon). Xénophon et les Dix Mille la traversent en 401 av. J.-C. Contour : royaume d'Arménie des atlas historiques, recoupé avec l'empire achéménide."}, "Peuples du Caucase": {"d": "Peuples du Caucase", "c": "#8f8a80", "n": "Colches, Ibères et montagnards du Caucase, tributaires lointains ou simplement hors de portée de l'empire."}, "Peuples des steppes et du Caucase": {"d": "Scythes et peuples du Caucase", "c": "#8f8a80", "n": "Les Scythes, maîtres de la steppe pontique, que Darius Iᵉʳ tenta en vain de soumettre lors de sa campagne de 513 av. J.-C. ; au sud, Colches et Ibères aux marges de l'empire."}, "Greek city-states": {"d": "Cités grecques", "c": "#8f8a80", "n": "Le monde grec des guerres médiques — Marathon (490), Salamine (480) — qui arrête l'expansion achéménide vers l'ouest."}, "Saharan Pastoral Nomads": {"d": "Nomades sahariens", "c": "#8f8a80", "n": "Pasteurs des marges désertiques."}}, "2": {"Armenia": {"d": "Royaume d'Arménie (Orontides)", "c": "#7a8f4a", "n": "Indépendant de fait après Gaugamèles (331 av. J.-C.) : l'Arménie n'a jamais été réellement conquise par Alexandre. Les Orontides règnent depuis Armavir puis Yervandashat, entre Séleucides et Pont, jusqu'à leur déposition par Antiochos III vers 200 av. J.-C. La Sophène forme un royaume orontide cadet."}, "Seleucid Kingdom": {"d": "Royaume séleucide", "c": "#8a5a3a", "n": "L'héritier asiatique de l'empire d'Alexandre, suzerain théorique de l'Arménie — un tribut intermittent, guère plus."}, "Kingdom of Antigonus": {"d": "Royaume d'Antigone", "c": "#9c6a4a", "n": "L'éphémère puissance d'Antigone le Borgne, maître de l'Asie Mineure jusqu'à sa mort à la bataille d'Ipsos (301 av. J.-C.), qui redistribue tout l'Orient hellénistique."}, "Cappadocia": {"d": "Cappadoce", "c": "#b58a3a", "n": "Royaume irano-anatolien voisin, dont la dynastie se dit elle aussi d'ascendance achéménide ; liens matrimoniaux fréquents avec les dynasties arméniennes."}, "Atropatene": {"d": "Médie Atropatène", "c": "#5c7a8f", "n": "Fondée par le satrape perse Atropatès après Alexandre, autour du lac d'Ourmia. Future rivale puis conquête de Tigrane le Grand — elle donnera son nom à l'Azerbaïdjan."}, "Colchis": {"d": "Colchide", "c": "#4a8f7a", "n": "Le royaume de la Toison d'or, sur la mer Noire, débouché des routes commerciales du plateau."}, "Peuples du Caucase": {"d": "Ibérie et peuples du Caucase", "c": "#8f8a80", "n": "Royaume d'Ibérie naissant et peuples des montagnes, au nord de l'espace arménien."}, "Ptolemaic Kingdom": {"d": "Royaume lagide (Ptolémées)", "c": "#8f8a80", "n": "L'Égypte hellénistique de Ptolémée, l'un des trois grands royaumes issus du partage de l'empire d'Alexandre."}, "Kingdom of Lysimachus": {"d": "Royaume de Lysimaque", "c": "#8f8a80", "n": "La Thrace et l'ouest anatolien de Lysimaque, autre diadoque, éliminé en 281 av. J.-C."}, "Kingdom of Kassander": {"d": "Royaume de Cassandre", "c": "#8f8a80", "n": "La Macédoine de Cassandre, berceau disputé de l'empire."}, "Bosporan Kingdom": {"d": "Royaume du Bosphore", "c": "#8f8a80", "n": "Royaume gréco-scythe de Crimée, grenier à blé du monde grec."}, "Nabatean Kingdom": {"d": "Royaume nabatéen", "c": "#8f8a80", "n": "Les caravaniers de Pétra, maîtres des routes de l'encens."}, "Bithynia": {"d": "Bithynie", "c": "#8f8a80", "n": "Petit royaume anatolien resté hors de l'empire d'Alexandre."}, "Crete": {"d": "Crète", "c": "#8f8a80", "n": "Cités crétoises indépendantes."}, "Peuples des steppes et du Caucase": {"d": "Scythes, Ibérie et Colchide", "c": "#8f8a80", "n": "La steppe scythe et les royaumes caucasiens naissants, dont l'Ibérie que la tradition dit organisée à cette époque."}, "Saharan Pastoral Nomads": {"d": "Nomades sahariens", "c": "#8f8a80", "n": "Pasteurs des marges désertiques."}}, "3": {"Armenia": {"d": "Grande Arménie (Artaxiades)", "c": "#a33434", "n": "Le royaume proclamé par Artaxias Iᵉʳ en 189 av. J.-C., qui « rassemble les terres où l'on parle arménien » (Strabon). Sous Tigrane II le Grand (95–55), l'empire s'étend brièvement « de la mer à la mer » — Syrie, Cilicie, Atropatène — avant que Lucullus puis Pompée (66 av. J.-C.) ne le ramènent aux frontières ici figurées, celles que le royaume conservera trois siècles."}, "Roman Empire": {"d": "Empire romain", "c": "#7a2f3a", "n": "Depuis Pompée, Rome considère l'Arménie comme son protectorat et y adoube les rois — quitte à envahir quand la Parthie place son propre candidat."}, "Parthian Empire": {"d": "Empire parthe", "c": "#2f6e5f", "n": "La puissance iranienne des Arsacides, rivale de Rome. L'Arménie, entre les deux, devient l'État tampon le plus disputé de l'Antiquité."}, "Peuples du Caucase": {"d": "Ibérie et Albanie du Caucase", "c": "#8f8a80", "n": "Royaumes caucasiens clients, tantôt de Rome, tantôt de la Parthie — Pompée y mène campagne en 65 av. J.-C."}, "Dacia": {"d": "Dacie", "c": "#8f8a80", "n": "Le royaume dace de Burebista, sur le Danube."}, "Nabatean Kingdom": {"d": "Royaume nabatéen", "c": "#8f8a80", "n": "Pétra, cliente de Rome."}, "Odrysian Kingdom": {"d": "Royaume odryse (Thrace)", "c": "#8f8a80", "n": "Royaume thrace client de Rome."}, "Judea": {"d": "Judée", "c": "#8f8a80", "n": "Le royaume d'Hérode le Grand, client de Rome."}, "Bosporian Kingdom": {"d": "Royaume du Bosphore", "c": "#8f8a80", "n": "Client de Rome en Crimée."}, "Peuples des steppes et du Caucase": {"d": "Sarmates, Ibérie et Albanie", "c": "#8f8a80", "n": "Les Sarmates ont remplacé les Scythes dans la steppe ; au sud du Caucase, l'Ibérie et l'Albanie, clientes disputées où Pompée mena campagne en 65 av. J.-C."}}, "4": {"Armenia": {"d": "Royaume arsacide d'Arménie", "c": "#7c4a6e", "n": "Depuis 66 apr. J.-C., une branche arsacide règne avec l'investiture romaine (Tiridate Iᵉʳ couronné par Néron). En 301, Tiridate III, converti par Grégoire l'Illuminateur, fait du christianisme la religion d'État — une première mondiale ; en 405, Mesrop Machtots crée l'alphabet. La monarchie sera abolie par la Perse en 428."}, "Rome (Diocletianus)": {"d": "Empire romain", "c": "#7a2f3a", "n": "Après la victoire de Galère sur les Perses (298), la paix de Nisibe renforce le protectorat romain sur l'Arménie — contexte direct de la conversion de 301."}, "Parthian Empire": {"d": "Empire perse (Sassanides)", "c": "#2e7f7a", "n": "Depuis 224, les Sassanides ont remplacé les Parthes (l'atlas source conserve l'ancienne étiquette). Zoroastrisme d'État et pression constante sur l'Arménie chrétienne : le partage de 387 lui en attribuera les quatre cinquièmes."}, "Peuples du Caucase": {"d": "Ibérie et Albanie du Caucase", "c": "#8f8a80", "n": "Royaumes caucasiens christianisés dans le sillage de l'Arménie, au cours du IVᵉ siècle."}, "Rome (Galerius)": {"d": "Empire romain (part de Galère)", "c": "#8a3a4a", "n": "La tétrarchie de Dioclétien partage l'administration de l'empire ; c'est Galère qui écrase les Perses en 298, imposant la paix de Nisibe favorable à l'Arménie."}, "Peuples des steppes et du Caucase": {"d": "Goths, Sarmates et Caucase", "c": "#8f8a80", "n": "Goths et Sarmates de la steppe pontique ; Ibérie et Albanie caucasiennes, christianisées au IVᵉ siècle dans le sillage de l'Arménie."}}, "5": {"Sasanian Empire": {"d": "Empire sassanide", "c": "#2e7f7a", "n": "La Perse gouverne la Persarménie par un marzpan (vice-roi) siégeant à Dvin, tout en laissant armées et privilèges héréditaires aux nakharars. La tentative d'imposer le zoroastrisme provoque Avarayr (451)."}, "Eastern Roman Empire": {"d": "Empire romain d'Orient", "c": "#6e3fa3", "n": "Byzance administre l'ouest arménien, réorganisé par Justinien en Arménie I à IV (536). Beaucoup d'Arméniens servent dans l'armée impériale — plusieurs monteront sur le trône."}, "Persarménie (marzpanat)": {"ov": 1, "d": "Persarménie (marzpanat)", "c": "#d4a548", "n": "Les terres arméniennes sous la Perse. Bataille d'Avarayr (451) : défaite militaire de Vardan Mamikonian, victoire morale — le traité de Nvarsak (484) garantit la liberté religieuse. Contour : royaume d'Arménie des atlas, recoupé avec l'empire sassanide."}, "Arménie byzantine": {"ov": 1, "d": "Arménie byzantine", "c": "#e0c98a", "n": "La part romaine du partage de 387, autour de Théodosiopolis (Karin/Erzurum). En 591, la frontière est déplacée vers l'est au profit de Byzance, après l'aide de Maurice à Khosrow II. Contour : royaume d'Arménie recoupé avec l'empire d'Orient."}, "Peuples du Caucase": {"d": "Ibérie, Albanie et Huns", "c": "#8f8a80", "n": "Royaumes caucasiens et passes du Caucase, que la Perse fortifie (Derbent) contre les nomades — en taxant lourdement les Arméniens."}, "Peuples des steppes et du Caucase": {"d": "Huns et peuples des steppes", "c": "#8f8a80", "n": "Après le passage d'Attila, Huns hephtalites et proto-Bulgares dominent les steppes ; la Perse fortifie les passes du Caucase (Derbent) — en en facturant l'entretien à ses sujets arméniens."}}, "6": {"Abbasid Caliphate": {"d": "Califat abbasside", "c": "#3f7f4f", "n": "Le califat de Bagdad, à son apogée sous Haroun al-Rachid. Les terres arméniennes y forment une province du nord, gouvernée par un ostikan, avec garnisons et émirats arabes implantés autour du lac de Van."}, "Ostikanat d'Arminiya": {"ov": 1, "d": "Ostikanat d'Arminiya", "c": "#d4a548", "n": "La province califale regroupant Arménie, Ibérie et Albanie du Caucase, gouvernée depuis Dvin. Les révoltes nakharars (703, 748, 774–775 — écrasée à Bagrévand) ruinent Mamikonian et Kamsarakan… au profit des Bagratides, bientôt « princes d'Arménie ». Contour : terres arméniennes recoupées avec le califat."}, "Byzantine Empire": {"d": "Empire byzantin", "c": "#6e3fa3", "n": "Réduit à l'Anatolie après les conquêtes arabes, l'empire mène chaque été la guerre des frontières — la patrie des Pauliciens arméniens et des épopées akritiques."}, "Khazars": {"d": "Khaganat khazar", "c": "#8a6f4f", "n": "L'empire des steppes au nord du Caucase, dont les invasions par les passes de Derbent frappent régulièrement l'Arminiya au VIIIᵉ siècle."}, "Cyprus": {"d": "Chypre", "c": "#8f8a80", "n": "Condominium arabo-byzantin insolite, se partageant les impôts de l'île pendant près de trois siècles."}, "Avars": {"d": "Khaganat avar", "c": "#8f8a80", "n": "Nomades installés dans le bassin danubien, longtemps fléau de Byzance."}, "Slavonic tribes": {"d": "Tribus slaves", "c": "#8f8a80", "n": "Le monde slave en expansion vers le sud et l'est."}, "Bulgars": {"d": "Khanat bulgare", "c": "#8f8a80", "n": "Le jeune État bulgare du Danube, rival de Byzance."}, "Magyars": {"d": "Magyars", "c": "#8f8a80", "n": "Encore nomades dans la steppe pontique, un siècle avant leur installation en Pannonie."}, "Peuples des steppes et du Caucase": {"d": "Peuples des steppes", "c": "#8f8a80", "n": "Steppes entre Khazars et Slaves."}}, "7": {"Armenia": {"d": "Royaumes bagratides", "c": "#c9a227", "n": "Achot Iᵉʳ couronné « roi des Arméniens » en 884, reconnu par le calife et par Byzance. Ani, capitale dès 961 : la « ville aux mille et une églises », ~100 000 habitants. Autour du royaume d'Ani gravitent les royaumes-frères — Vaspurakan (908), Kars (963), Lori (978), Syunik (987) — fragmentation qui fera le jeu de Byzance puis des Seldjoukides (Ani annexée en 1045, Manzikert en 1071)."}, "Byzantine Empire": {"d": "Empire byzantin", "c": "#6e3fa3", "n": "L'empire macédonien à son apogée, qui grignote les royaumes arméniens : Vaspurakan cédé en 1021, Ani annexée en 1045 — dégarnissant la frontière à la veille des invasions turques."}, "Buwayhid Emirates": {"d": "Émirats musulmans (Rawwadides, Marwanides…)", "c": "#5c7a52", "n": "L'atlas source regroupe sous l'étiquette « bouyide » l'orbite musulmane orientale ; autour du plateau, il s'agit des Rawwadides d'Azerbaïdjan, des Marwanides du Taurus et des émirats du lac de Van, enchâssés entre les royaumes chrétiens."}, "Kingdom of Georgia": {"d": "Royaume de Géorgie", "c": "#4a8f7a", "n": "Le jeune royaume unifié par Bagrat III (1008) — une branche de la même famille bagratide que les rois d'Ani."}, "Shirvan": {"d": "Chirvan", "c": "#8f7a3a", "n": "Émirat de la Caspienne, au nord de la Koura."}, "Arran": {"d": "Arran (ancienne Albanie du Caucase)", "c": "#7d6248", "n": "La plaine entre Koura et Araxe ; les principautés arméniennes du Khatchen (Artsakh) s'y maintiennent dans les montagnes."}, "Khazars": {"d": "Khazars", "c": "#8f8a80", "n": "Le khaganat déclinant, bientôt balayé par les Rus' et les nomades."}, "Alans": {"d": "Alains", "c": "#8f8a80", "n": "Royaume chrétien du Caucase central."}, "Fatimid Caliphate": {"d": "Califat fatimide", "c": "#8f8a80", "n": "Le califat chiite du Caire, rival des Abbassides, aux confins syriens."}, "Cyprus": {"d": "Chypre (byzantine)", "c": "#8f8a80", "n": "Reprise par Byzance en 965."}, "Peshemegs": {"d": "Petchénègues", "c": "#8f8a80", "n": "Nomades turcs de la steppe pontique, fléau de la Rus' et de Byzance au Xᵉ siècle."}, "Bulgar Khanate": {"d": "Bulgarie de la Volga", "c": "#8f8a80", "n": "L'État bulgare musulman de la moyenne Volga, plaque tournante du commerce des fourrures."}, "Ghaznavid Emirate": {"d": "Empire ghaznévide", "c": "#8f8a80", "n": "La grande puissance turco-iranienne de l'Orient, de l'Iran à l'Inde."}, "Kyivan Rus": {"d": "Rus' de Kiev", "c": "#8f8a80", "n": "La principauté de Kiev, récemment christianisée (988)."}, "Magyars": {"d": "Royaume de Hongrie", "c": "#8f8a80", "n": "La Hongrie chrétienne d'Étienne Iᵉʳ (couronné en 1000)."}}, "8": {"Armenia": {"d": "Principauté zakaride", "c": "#b58a3a", "n": "Le nord arménien libéré (1199–1236) par les frères Zakaré et Ivané Zakarian, généraux de la reine Tamar de Géorgie. Renaissance d'Ani et des grands monastères (Gochavank, Haghartsine) — avant la vague mongole de 1236, puis l'écrasement fiscal de l'Ilkhanat."}, "Royaume arménien de Cilicie": {"d": "Royaume arménien de Cilicie", "c": "#3a6fb5", "n": "Fondé par des princes fuyant les invasions seldjoukides : principauté roupénide (1080), royaume au couronnement de Léon Iᵉʳ le Magnifique (1198). Allié des croisés puis des Mongols, prospère par ses ports — Ayas, escale de Marco Polo — et ses miniaturistes (Toros Roslin). Sis tombe aux Mamelouks en 1375 ; le dernier roi, Léon V de Lusignan, meurt exilé à Paris. Contour : plaine cilicienne découpée dans les géométries de l'atlas (littoral réel)."}, "Georgia": {"d": "Royaume de Géorgie (reine Tamar)", "c": "#4a8f7a", "n": "À son apogée sous Tamar (1184–1213), suzeraine des terres zakarides — l'âge d'or commun arméno-géorgien."}, "Byzantine Empire": {"d": "Byzance et Sultanat de Roum", "c": "#6e3fa3", "n": "L'atlas source rattache encore l'Anatolie à Byzance ; dans les faits, l'intérieur est seldjoukide (sultanat de Roum, capitale Konya) depuis Manzikert (1071), Byzance ne tenant que les côtes."}, "Buwayhid Emirates": {"d": "Atabegs et émirats (Eldiguzides, Ahlatchahs…)", "c": "#8a6f4f", "n": "L'orbite turco-musulmane orientale (étiquette générique de l'atlas) : atabegs eldiguzides d'Azerbaïdjan et Chah-Arménides d'Ahlat, sur le lac de Van — tous balayés par les Mongols après 1230."}, "Cuman Khanates": {"d": "Khanats coumans", "c": "#8f8a80", "n": "Les Coumans-Kiptchaks, maîtres de la steppe pontique, fournisseurs de cavaliers aux armées géorgiennes de la reine Tamar — et premières victimes de la vague mongole."}, "Fatimid Caliphate": {"d": "Ayyoubides (Syrie)", "c": "#8f8a80", "n": "Aux confins syriens, l'empire de Saladin et de ses héritiers (étiquette de l'atlas antérieure d'un règne)."}, "Cyprus": {"d": "Chypre des Lusignan", "c": "#8f8a80", "n": "Royaume croisé depuis 1192, étroitement lié à la Cilicie par mariages — les Lusignan donneront son dernier roi à l'Arménie."}, "Kara Khitai Khaganate": {"d": "Kara-Khitans", "c": "#8f8a80", "n": "Empire des steppes d'Asie centrale, bientôt absorbé par Gengis Khan."}, "Hungary": {"d": "Royaume de Hongrie", "c": "#8f8a80", "n": "La Hongrie arpadienne."}, "Principality of Galicia-Volhynia": {"d": "Galicie-Volhynie", "c": "#8f8a80", "n": "Principauté russe occidentale."}, "Ghaznavid Emirate": {"d": "Khorezm et Orient iranien", "c": "#8f8a80", "n": "L'Orient iranien (étiquette générique de l'atlas), dominé au tournant du XIIIᵉ siècle par les chahs du Khorezm — dont la chute déclenchera l'irruption mongole vers l'ouest."}, "Bulgar Khanate": {"d": "Bulgarie de la Volga", "c": "#8f8a80", "n": "L'État bulgare de la Volga, détruit par les Mongols en 1236 — la même année que l'invasion de l'Arménie."}, "Peuples des steppes et du Caucase": {"d": "Steppes du nord", "c": "#8f8a80", "n": "Marges septentrionales de la steppe."}}, "9": {"Ottoman Empire": {"d": "Empire ottoman — Arménie occidentale", "c": "#7a2f3a", "n": "Depuis Tchaldiran (1514) et la paix de Zuhab (1639), l'ouest du plateau est ottoman : les six vilayets d'Anatolie orientale, où vit la majorité des Arméniens sous le régime du millet — autonomie religieuse sous le patriarcat de Constantinople, mais fiscalité lourde et insécurité croissante."}, "Persia": {"d": "Perse — Arménie orientale (khanats d'Erevan, Nakhitchevan, Karabagh)", "c": "#2f6e5f", "n": "L'est du plateau sous les Séfévides puis les Kadjars. En 1604, Chah Abbas déporte des centaines de milliers d'Arméniens vers Ispahan (Nouvelle-Djoulfa) ; les méliks du Karabagh gardent une autonomie montagnarde. Le traité de Turkmentchaï (1828) cède les khanats d'Erevan et du Nakhitchevan à la Russie — matrice de l'Arménie moderne, de la première République (1918) et de l'indépendance (1991)."}, "Russian Empire": {"d": "Empire russe", "c": "#4a6b8f", "n": "La Russie franchit le Caucase : Géorgie annexée en 1801, khanats conquis de 1805 à 1828 (Erevan prise par Paskévitch en 1827). Des dizaines de milliers d'Arméniens de Perse et de Turquie migrent vers les provinces russes."}, "central Asian khanates": {"d": "Khanats du Caucase et d'Asie centrale", "c": "#8f8a80", "n": "Mosaïque de khanats caspiens et centrasiatiques (Bakou, Chirvan, Derbent, Khiva…), vassaux flottants de la Perse ; les khanats caucasiens seront absorbés un à un par la Russie entre 1805 et 1828."}, "Austrian Empire": {"d": "Monarchie des Habsbourg", "c": "#8f8a80", "n": "L'autre grand rival européen de la Porte ottomane."}, "Afghanistan": {"d": "Afghanistan (Durrani)", "c": "#8f8a80", "n": "L'empire durrani, né en 1747 du démembrement de la Perse de Nadir Chah."}, "Cyrenaica": {"d": "Cyrénaïque", "c": "#8f8a80", "n": "Marge ottomane d'Afrique du Nord."}}};
const DEFAUT = {c:"#8f8a80", n:"Entité voisine de l'espace arménien à cette époque."};

const map = L.map("map",{zoomControl:true, minZoom:4, maxBounds:[[26,14],[50,68]], maxBoundsViscosity:0.6}).setView([38.9,42.0], 6);
const attrib = '&copy; OpenStreetMap &copy; CARTO · Frontières : historical-basemaps (aourednik) — tracés indicatifs, cadre limité au Proche-Orient élargi';
let base = L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png",
  {maxZoom:12, minZoom:4, attribution:attrib, subdomains:"abcd"});
let fallbackDone = false;
base.on("tileerror", ()=>{
  if(fallbackDone) return; fallbackDone = true;
  map.removeLayer(base);
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",
    {maxZoom:12, minZoom:4, attribution:'&copy; OpenStreetMap · Frontières : historical-basemaps — tracés indicatifs, cadre limité au Proche-Orient élargi'}).addTo(map);
});
base.addTo(map);

L.marker([39.70,44.30],{icon:L.divIcon({className:"capicon",
  html:'<span class="star" style="color:#5a4632">▲</span><span class="mn">Ararat</span>',iconSize:null}),
  interactive:false}).addTo(map);

let layer = L.layerGroup().addTo(map);
const panel = document.getElementById("pbody");
const aside = document.getElementById("panel");
document.getElementById("fermer").onclick = ()=>aside.classList.remove("ouvert");
document.getElementById("infobtn").onclick = ()=>aside.classList.add("ouvert");
function ouvrir(){ if(window.matchMedia("(max-width:860px)").matches) aside.classList.add("ouvert"); }
const pn = document.querySelector("#ptitle .nom");
const pd = document.querySelector("#ptitle .dates");
let cur = 0;

function meta(name){ return (ENT[String(cur)] && ENT[String(cur)][name]) || Object.assign({d:name}, DEFAUT); }

function panelPeriode(p){
  panel.innerHTML =
    '<div class="eyebrow">Période ' + (cur+1) + " / " + PERIODES.length + "</div>" +
    "<h2>" + p.nom + "</h2>" +
    '<div class="sousdates">' + p.dates + "</div>" +
    '<span class="badge">' + p.pouvoir + "</span>" +
    p.apercu.map(t=>"<p>"+t+"</p>").join("") +
    "<p><strong>Occupations et suzerainetés :</strong> " + p.contexte + "</p>" +
    '<div class="astuce">Cliquez sur un État de la carte ou sur une capitale ★. Frontières digitalisées à partir d\'atlas historiques publiés — précision indicative, non kilométrique.</div>';
}
function panelEntite(p, name){
  const m = meta(name);
  panel.innerHTML =
    '<button class="retour" id="ret">← Retour à la période</button>' +
    '<div class="eyebrow">' + (m.ov ? "Terres arméniennes · " : "État · ") + p.nom + "</div>" +
    "<h2>" + (m.d || name) + "</h2>" +
    '<div class="sousdates">' + p.dates + "</div>" +
    '<span class="badge" style="border-left-color:' + m.c + '">' + p.pouvoir + "</span>" +
    "<p>" + m.n + "</p>";
  document.getElementById("ret").onclick = ()=>panelPeriode(p);
  ouvrir();
}
function panelCapitale(p, ca){
  panel.innerHTML =
    '<button class="retour" id="ret">← Retour à la période</button>' +
    '<div class="eyebrow">' + (ca.principal ? "Capitale" : "Ville majeure") + " · " + p.nom + "</div>" +
    "<h2>★ " + ca.nom + "</h2>" +
    '<div class="sousdates">' + p.dates + "</div>" +
    "<p>" + ca.info + "</p>";
  document.getElementById("ret").onclick = ()=>panelPeriode(p);
  ouvrir();
}

function render(){
  const p = PERIODES[cur];
  pn.textContent = p.nom;
  pd.textContent = p.dates;
  layer.clearLayers();

  const mini = window.innerWidth < 861;
  GEO[cur].features.forEach(f=>{
    const name = f.properties.NAME;
    const ov = f.properties.OVERLAY;
    const m = meta(name);
    const style = ov
      ? {color:"#8a6508", weight:2.2, dashArray:"7 5", opacity:.9, fillColor:m.c, fillOpacity:.3}
      : {color:"#241505", weight:1.3, opacity:.5, fillColor:m.c, fillOpacity:.4};
    const g = L.geoJSON(f, {style});
    g.bindTooltip(m.d || name, {sticky:true, className:"provtip"});
    g.on("click", e=>{ L.DomEvent.stopPropagation(e); panelEntite(p, name); });
    g.on("mouseover", ()=>g.setStyle({fillOpacity: ov ? .45 : .58, weight: ov ? 3 : 2.2}));
    g.on("mouseout",  ()=>g.setStyle({fillOpacity: ov ? .3 : .4, weight: ov ? 2.2 : 1.3}));
    layer.addLayer(g);
    if(ov || f.properties.aire > (mini ? 8 : 2.5)){
      const short = (m.d || name).replace(/\s*\(.*\)/,"");
      layer.addLayer(L.marker(f.properties.lbl,{
        icon:L.divIcon({className:"zlabel" + (ov ? " ov" : ""), html:short, iconSize:null}),
        interactive:false, keyboard:false}));
    }
  });

  p.capitales.forEach(ca=>{
    const mk = L.marker([ca.lat, ca.lng],{
      icon:L.divIcon({className:"capicon" + (ca.principal ? "" : " sec"),
        html:'<span class="star">★</span><span class="mn">'+ca.nom+"</span>",
        iconSize:null, iconAnchor:[8,10]}),
      keyboard:true, title:ca.nom, zIndexOffset:1000});
    mk.on("click", ()=>panelCapitale(p, ca));
    layer.addLayer(mk);
  });

  document.querySelectorAll("#timeline button").forEach((b,i)=>{
    b.classList.toggle("actif", i===cur);
    b.setAttribute("aria-selected", i===cur ? "true" : "false");
  });
  panelPeriode(p);
  map.flyToBounds([[35.4,33.8],[42.5,48.8]], {duration:.7});
}

const tl = document.getElementById("timeline");
PERIODES.forEach((p,i)=>{
  const b = document.createElement("button");
  b.setAttribute("role","tab");
  b.innerHTML = '<div class="bar" style="background:'+p.tc+'"></div>' +
    '<div class="td">'+p.dates+'</div><div class="tn">'+p.nom+"</div>";
  b.onclick = ()=>{ cur=i; render(); };
  tl.appendChild(b);
});
document.getElementById("prev").onclick = ()=>{ cur=(cur-1+PERIODES.length)%PERIODES.length; render(); };
document.getElementById("next").onclick = ()=>{ cur=(cur+1)%PERIODES.length; render(); };
document.addEventListener("keydown", e=>{
  if(e.target.tagName==="INPUT") return;
  if(e.key==="ArrowLeft"){ cur=(cur-1+PERIODES.length)%PERIODES.length; render(); }
  if(e.key==="ArrowRight"){ cur=(cur+1)%PERIODES.length; render(); }
});
render();
</script>
</body>
</html>
